name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: test-bot
            path: .
          - module: mcp-server
            path: mcp-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test
        working-directory: ${{ matrix.path }}
        run: |
          chmod +x ./mvnw
          ./mvnw --batch-mode --no-transfer-progress clean verify
