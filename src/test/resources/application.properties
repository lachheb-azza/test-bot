# Test-only configuration.
# Disable the MCP client so the context can load without the external
# MCP servers (mcprh / ebank) being up. Without this, mcpSyncClients fails
# to initialize at startup and the whole ApplicationContext fails to load.
spring.ai.mcp.client.enabled=false

# Avoid relying on a real model endpoint / API key during tests.
spring.ai.openai.api-key=test
spring.ai.openai.base-url=http://localhost:11434

# Telegram bot key is not needed for the context-load test.
telegram.api.key=test
